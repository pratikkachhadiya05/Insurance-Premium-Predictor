<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1" />
		<title>Insurance Premium Predictor</title>
		<link rel="stylesheet" href="/static/style.css">
	</head>
	<body>
		<h1>Insurance Premium Predictor</h1>
		<form id="predictForm" action="/predict" method="post">
			<div class="field">
				<label for="age">Age</label>
				<input id="age" name="age" type="number" min="1" max="119" required />
			</div>

			<div class="field">
				<label for="weight">Weight (kg)</label>
				<input id="weight" name="weight" type="number" step="0.1" min="1" required />
			</div>

			<div class="field">
				<label for="height">Height (m)</label>
				<input id="height" name="height" type="number" step="0.01" min="0.5" max="2.5" required />
			</div>

			<div class="field">
				<label for="income_lpa">Income (LPA)</label>
				<input id="income_lpa" name="income_lpa" type="number" step="0.01" min="0" required />
			</div>

			<div class="field">
				<label for="smoker">Smoker</label>
				<select id="smoker" name="smoker" required>
					<option value="false" selected>No</option>
					<option value="true">Yes</option>
				</select>
			</div>

			<div class="field">
				<label for="city">City</label>
				<input id="city" name="city" list="cities" required />
				<datalist id="cities">

					{% for city in tier_1_cities %}
					<option value="{{ city }}"></option>
					{% endfor %}

					{% for city in tier_2_cities %}
					<option value="{{ city }}"></option>
					{% endfor %}

				</datalist>
			</div>

			<div class="field">
				<label for="occupation">Occupation</label>
				<select id="occupation" name="occupation" required>
					<option value="private_job" selected>private_job</option>
					<option value="government_job">government_job</option>
					<option value="business_owner">business_owner</option>
					<option value="freelancer">freelancer</option>
					<option value="student">student</option>
					<option value="retired">retired</option>
					<option value="unemployed">unemployed</option>
				</select>
			</div>

			<div class="full">
				<button type="submit">Predict</button>
			</div>
		</form>
	</body>
</html>
